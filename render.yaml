services:
  - type: web
    name: linkcheck
    runtime: python
    region: frankfurt

    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: gunicorn main:app --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 120

    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"

    disk:
      name: screenshots
      mountPath: /opt/render/project/src/static/screenshots
      sizeGB: 1
