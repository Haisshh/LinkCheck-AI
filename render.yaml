services:
  - type: web
    name: linkcheck-ai
    env: docker
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: LINKCHECK_THREAT_INTEL
        value: "true"
      - key: LINKCHECK_THREAT_INTEL_WAIT
        value: "2.5"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "4"
      - key: SECRET_KEY
        generateValue: true
      - key: FEEDBACK_ADMIN_TOKEN
        generateValue: true
      - key: DISCORD_FEEDBACK_WEBHOOK
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: IPQS_API_KEY
        sync: false
      - key: URLHAUS_AUTH_KEY
        sync: false
      - key: PHISHTANK_API_KEY
        sync: false
